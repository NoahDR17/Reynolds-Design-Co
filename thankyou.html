<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Thanks — Reynolds Design Co.</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#14213D;
    --paper:#F7F4EE;
    --amber:#E8A33D;
    --sage:#6B8F71;
    --text:#1B1B1B;
    --border:#DDD6C7;
    --white:#FFFFFF;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--paper); color:var(--text); font-family:'Inter',sans-serif;
    line-height:1.5; min-height:100vh; display:flex; flex-direction:column;
  }
  nav{
    display:flex; justify-content:space-between; align-items:center;
    padding:24px 32px; max-width:1080px; margin:0 auto; width:100%;
  }
  .logo{font-family:'Fraunces',serif; font-weight:600; font-size:20px; color:var(--ink); text-decoration:none;}

  main{
    flex:1; display:flex; align-items:center; justify-content:center; text-align:center;
    padding:48px 32px;
  }
  .confirm{max-width:480px;}
  .check{
    width:56px; height:56px; border-radius:50%; background:var(--ink);
    display:flex; align-items:center; justify-content:center; margin:0 auto 24px;
  }
  .check svg{width:26px; height:26px; stroke:var(--amber);}
  .eyebrow{
    font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:0.12em;
    text-transform:uppercase; color:var(--sage); display:flex; align-items:center;
    justify-content:center; gap:10px; margin-bottom:16px;
  }
  .eyebrow::before, .eyebrow::after{content:''; width:18px; height:1px; background:var(--sage);}
  h1{
    font-family:'Fraunces',serif; font-weight:600; font-size:34px; color:var(--ink);
    margin-bottom:16px; letter-spacing:-0.01em;
  }
  p{font-size:15px; color:#3d3d3d; margin-bottom:28px;}
  .btn-primary{
    font-family:'IBM Plex Mono',monospace; font-size:14px; background:var(--amber); color:var(--ink);
    padding:14px 26px; border-radius:2px; text-decoration:none; font-weight:500;
    box-shadow:4px 4px 0 var(--ink); transition:transform .15s ease; display:inline-block;
  }
  .btn-primary:hover{transform:translate(2px,2px); box-shadow:2px 2px 0 var(--ink);}

  footer{background:var(--paper); border-top:1px solid var(--border); padding:24px 0;}
  .footer-copyright{font-size:12px; color:#8a8a8a; text-align:center;}
</style>
</head>
<body>

<nav>
  <a class="logo" href="index.html">Reynolds Design Co.</a>
</nav>

<main>
  <div class="confirm">
    <div class="check">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </div>
    <div class="eyebrow">Enquiry Received</div>
    <h1>Thanks — that's in.</h1>
    <p>Your enquiry has been sent. Expect a reply within 1 business day, usually with your free mockup or a couple of quick follow-up questions to get started.</p>
    <a class="btn-primary" href="index.html">← Back to the site</a>
  </div>
</main>

<footer>
  <div class="footer-copyright">© 2026 Reynolds Design Co. All rights reserved.</div>
</footer>

</body>
</html>
